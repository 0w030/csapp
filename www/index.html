<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSApp QR Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container" class="container">
        <h1>QR Code 驗證系統</h1>
        
        <button id="start-scan-btn">開啟相機掃描</button>

        <div class="result-box">
            <h3>掃描結果：</h3>
            <p id="scan-result">尚未掃描</p>
        </div>

        <div class="status-box">
            <h3>驗證狀態：</h3>
            <p id="verify-status" class="status-waiting">等待掃描中...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
