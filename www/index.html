<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSApp QR Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container" class="container">
        <h1>QR Code 驗證系統</h1>
        
        <!-- 區塊一：QR Code 掃描功能 -->
        <button id="start-scan-btn">開啟相機掃描</button>
        <p id="scan-mode-text" class="scan-mode-text">目前掃描模式：等待判斷</p>

        <div class="device-info-box">
            <h3>裝置資訊</h3>
            <p class="device-info-label">Device UUID：</p>
            <pre id="device-uuid">載入中...</pre>
        </div>

        <div class="result-box">
            <h3>掃描結果：</h3>
            <p id="scan-result">尚未掃描</p>
        </div>

        <div class="status-box">
            <h3>驗證狀態：</h3>
            <p id="verify-status" class="status-waiting">等待掃描中...</p>
        </div>

        <!-- 區塊二：語音指令系統擴充 (新增於此) -->
        <div class="voice-section">
            <h2>語音指令系統</h2>
            <button id="start-voice-btn">開始語意輸入</button>
            <p id="voice-status" class="scan-mode-text">狀態：點擊按鈕開始</p>
            
            <div class="voice-result-box result-box">
                <h3>語音轉文字結果：</h3>
                <textarea id="voice-result" rows="3" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px;">等待語音輸入...</textarea>
                
                <button id="analyze-text-btn" style="background-color: #28a745; width: 100%; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">確認文字無誤並分析</button>
            </div>
        </div>
    </div>

    <!-- Web 掃描所需的視訊與畫布元素 -->
    <video id="qr-video" hidden muted></video>
    <canvas id="qr-canvas" hidden></canvas>

    <!-- 💡 加入這行：引入輕量級拼音轉換套件 -->
    <script src="https://unpkg.com/pinyin-pro"></script>

    <script src="dictionary.js"></script>
    <script src="app.js"></script>
</body>
</html>
